<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
* { font-family: 'Poppins', sans-serif !important; }

body { 
  background:#fff;
  padding-top:10px; 
  font-size:12px;
  text-align:center;
}

html, body {
  height: 100%;
  margin: 0;
}

.wrapper {
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

.content {
  flex: 1;
}

.footer {
  text-align: center;
  font-size: 11px;
  color: #777;
  padding: 10px;
  border-top: 1px solid #ccc;
}

/* SCANNER */
#reader { width:300px; margin:15px auto; }

/* MODAL */
.modal {
  display:none;
  position:fixed;
  z-index:999;
  left:0; top:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.4);
}

.modal-content {
  background:white;
  margin: 5vh auto; /* pakai viewport height */
  padding:15px;
  width:90%;
  max-width:350px;
  border-radius:12px;
  text-align:left;
}

/* FORM BOX (pakai referensi Anda) */
.form-box {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 6px 6px 15px rgba(0,0,0,0.25);
}

/* LABEL */
.label {
  font-size: 12px;
  color: #777;
  margin-top: 8px;
  margin-bottom: 2px;
}

/* INPUT */
input, select {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  font-size:12px;
  box-sizing: border-box;
}

/* BUTTON */
button {
  padding:6px 14px;
  background: #0d6efd;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size:12px;
}

button:active {
  transform: scale(0.95);
}

/* TOAST */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #333;
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.4s;
  z-index: 999;
  font-size:12px;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success { background: #4CAF50; }
.toast.error { background: #e74c3c; }

/* TEXT INFO */
.qr-title {
  text-align:center;
  font-weight:bold;
  font-size:14px;
}

.status-text {
  font-size:11px;
  text-align:justify;
  margin-top:5px;
}

.doc-text {
  font-size:11px;
  text-align:justify;
  margin-top:5px;
}

.btn-back {
  background: none;
  border: none;
  font-size: 28px;
  color: #0d6efd;
  cursor: pointer;
  margin-top: 10px;
}

.btn-back:active {
  transform: scale(0.9);
}
</style>
</head>

<body>
<div class="wrapper">

<div class="content">
<h3>Scan QR Map</h3>
<button onclick="startScan()">SCAN</button><br>

<button onclick="goBack()" class="btn-back">
  <i class="bi bi-arrow-left-circle"></i>
</button>
<div id="reader"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
const API_URL = "https://script.google.com/a/macros/upy.ac.id/s/AKfycbypzC2-91SA938gYLfY-ZtsThce_T4FVGAUXsP-LR_3QN9Nf9oF3csjZwCZJJhWDZKYSQ/exec";

let currentMap = null;
let currentQR = null;
let masterData = {};

/* LOAD MASTER */
function loadMaster(){
  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({action:"master"})
  })
  .then(r=>r.json())
  .then(data=>{
    masterData = data;
  });
}
window.onload = loadMaster;

/* SCAN */
function startScan(){
  const scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices=>{
    let cam = devices.find(d=>d.label.toLowerCase().includes("back")) || devices[0];

    scanner.start(cam.id,{fps:10,qrbox:250}, qr=>{
      scanner.stop();

      fetch(API_URL,{
        method:"POST",
        body: JSON.stringify({action:"scan", qr:qr})
      })
      .then(r=>r.json())
      .then(res=>handleResult(res));
    });
  });
}

/* HANDLE RESULT */
function handleResult(res){

  if(res.status === "error"){
    showToast(res.message,"error");
    return;
  }

  let statusText = "";
  let dokumen = "-";
  let jumlah = "-";

  if(res.status === "available"){
    statusText = "Map Ready";
    currentMap = res.id_map;
    currentQR = res.kode_qr;
  }

  if(res.status === "in_progress"){
    statusText = res.data[res.data.length-1] || "-";
    dokumen = res.data[3] || "-";
    jumlah = res.data[4] || "-";

    currentMap = res.data[1];

    // 🔥 INI YANG HILANG SEBELUMNYA
    currentQR = res.data[2] || "-";
  }

  openModal(`
  <div class="form-box">

    <div class="qr-title">${currentQR || '-'}</div>

    <div class="status-text">
      Status : ${statusText}
    </div>

    <div class="doc-text">
      Isi Map : ${dokumen}
    </div>

    <div class="doc-text">
      Jumlah : ${jumlah}
    </div>

    <div class="label">Unit</div>
    ${dropdownUnit()}

    <div class="label">Staf</div>
    <select id="staf"></select>

    ${
      res.status === "available" ? `
        <div class="label">Dokumen isi map</div>
        <input id="dokumen">

        <div class="label">Jumlah (exp/bendel)</div>
        <input id="jumlah" type="text">

        <div class="label">Password</div>
        <input id="password" type="password">

        <button id="btnKirim" onclick="kirim()">Ajukan</button>
      ` :
      `
        <div class="label">Password</div>
        <input id="password" type="password">

        <button id="btnUpdate" onclick="update()">Update</button>
      `
    }

    <button onclick="closeModal()">Tutup</button>
  </div>
  `);

  initDropdown();
}

/* DROPDOWN */
function dropdownUnit(){
  let html = `<select id="unit" onchange="loadStaf()">`;
  html += `<option value="">Pilih Unit</option>`;

  (masterData.units || []).forEach(u=>{
    html += `<option value="${u}">${u}</option>`;
  });

  html += `</select>`;
  return html;
}

function loadStaf(){
  const unit = document.getElementById("unit").value;
  const staf = document.getElementById("staf");

  staf.innerHTML = `<option value="">Pilih Staf</option>`;

  if(masterData.staf && masterData.staf[unit]){
    masterData.staf[unit].forEach(s=>{
      staf.innerHTML += `<option value="${s}">${s}</option>`;
    });
  }
}

function initDropdown(){
  loadStaf();
}

/* ACTION */
function kirim(){

  const btn = document.getElementById("btnKirim");
  btn.innerText = "Memproses...";
  btn.disabled = true;

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"kirim",
      id_map: currentMap,
      kode_qr: currentQR,
      dokumen: document.getElementById("dokumen").value,
      jumlah: document.getElementById("jumlah").value,
      unit: document.getElementById("unit").value,
      staf: document.getElementById("staf").value,
      password: document.getElementById("password").value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    showToast(res.message,"success");
    closeModal();
  })
  .catch(()=>{
    showToast("Terjadi kesalahan","error");
  })
  .finally(()=>{
    btn.innerText = "Kirim";
    btn.disabled = false;
  });
}

function update(){

  const btn = document.getElementById("btnUpdate");
  btn.innerText = "Memproses...";
  btn.disabled = true;

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"update",
      id_map: currentMap,
      unit: document.getElementById("unit").value,
      staf: document.getElementById("staf").value,
      password: document.getElementById("password").value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    showToast(res.message,"success");
    closeModal();
  })
  .catch(()=>{
    showToast("Terjadi kesalahan","error");
  })
  .finally(()=>{
    btn.innerText = "Update";
    btn.disabled = false;
  });
}

/* MODAL */
function openModal(html){
  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modal").style.display = "block";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* TOAST */
function showToast(msg,type="success"){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.className = "toast show " + type;

  setTimeout(()=>{
    t.className = "toast";
  },3000);
}

function goBack(){
  window.location.href = "https://sites.google.com/upy.ac.id/antasena";
}
</script>
<div class="footer">

<div style="
  text-align:center;
  font-size:11px;
  color:#777;
  margin-top:8px;
  margin-bottom:10px;
">
  Dikelola oleh Divisi Administrasi Kantor Sekretariat Rektorat
</div>
</div>
</div>
</body>
</html>
